<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histori-IA | TFM</title>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ 
            startOnLoad: true, 
            theme: 'base',
            flowchart: { 
                htmlLabels: true, 
                useMaxWidth: false, // ESTO evita que se vea pequeño
                curve: 'basis' 
            },
            themeVariables: {
                primaryColor: '#ffffff',
                primaryTextColor: '#4a0e0e',
                lineColor: '#800000',
                fontFamily: "'Montserrat', sans-serif",
                fontSize: '18px'
            }
        });
        window.mermaid = mermaid;
    </script>
    <style>
        /* TRES COLORES: Crema (#F5F5F0), Granate (#800000), Pizarra (#2C2C2C) */
        :root { --fondo: #F5F5F0; --acentos: #800000; --texto: #2C2C2C; }
        
        body { font-family: 'Montserrat', sans-serif; background-color: var(--fondo); margin: 0; color: var(--texto); overflow-x: hidden; }
        
        .header { text-align: center; padding: 40px 20px; background: var(--texto); color: white; border-bottom: 5px solid var(--acentos); }
        .header h1 { font-family: 'Crimson Pro', serif; font-size: 3em; margin: 0; letter-spacing: 2px; }
        
        .search-container { position: relative; width: 100%; display: flex; justify-content: center; margin-top: -30px; }
        .search-box { background: white; padding: 8px; border-radius: 4px; border: 2px solid var(--acentos); display: flex; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 80%; max-width: 600px; }
        
        input { flex: 1; border: none; padding: 15px; font-size: 18px; outline: none; }
        button { background: var(--acentos); color: white; border: none; padding: 0 30px; cursor: pointer; font-weight: 600; text-transform: uppercase; transition: 0.3s; }
        button:hover { background: #5a0000; }
        
        /* Contenedor del Mapa: ¡GRANDE! */
        .canvas-wrapper { width: 98%; margin: 40px auto; overflow: auto; background: white; border-radius: 8px; border: 1px solid #ddd; padding: 20px; box-shadow: inset 0 0 10px rgba(0,0,0,0.05); }
        .mermaid { min-width: 1000px; display: flex; justify-content: center; transform: scale(1.1); transform-origin: top center; }
        
        #loading { display: none; text-align: center; color: var(--acentos); font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>HISTORI-IA</h1>
        <p>RECURSO INTERACTIVO DE HISTORIA DE ESPAÑA</p>
    </div>
    
    <div class="search-container">
        <div class="search-box">
            <input type="text" id="userInput" placeholder="PERSONAJE (P. ej. CANOVAS)">
            <button onclick="generateDiagram()">GENERAR</button>
        </div>
    </div>

    <div id="loading">Consultando archivos...</div>

    <div class="canvas-wrapper">
        <div id="graphOutput" class="mermaid">
            graph LR
                A[Escribe un nombre] --- B[Canovas]
                A --- C[Sagasta]
                A --- D[Isabel II]
                style A fill:#fff,stroke:#800000
        </div>
    </div>

    <script>
        async function generateDiagram() {
            const input = document.getElementById('userInput').value.toUpperCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            const graphOutput = document.getElementById('graphOutput');
            const loading = document.getElementById('loading');
            
            if(!input) return;
            loading.style.display = 'block';
            
            try {
                const response = await fetch('datos.json?v=' + Date.now());
                const datos = await response.json();
                
                if (datos[input]) {
                    graphOutput.removeAttribute('data-processed');
                    graphOutput.innerHTML = datos[input];
                    await mermaid.run({ nodes: [graphOutput] });
                } else {
                    alert("No encontrado. Prueba: CANOVAS, SAGASTA, GOYA, ISABEL II, CARLOS IV o FERNANDO VII");
                }
            } catch (e) { console.error(e); }
            finally { loading.style.display = 'none'; }
        }
    </script>
</body>
</html>
