<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histori-IA | TFM</title>
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ 
            startOnLoad: true, 
            theme: 'neutral',
            securityLevel: 'loose'
        });
        window.mermaid = mermaid;
    </script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 30px; }
        .search-container { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 600px; display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex-grow: 1; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; outline: none; transition: border 0.2s; }
        input:focus { border-color: var(--primary); }
        button { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .canvas { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 900px; min-height: 400px; display: flex; flex-direction: column; align-items: center; overflow: auto; }
        #loading { display: none; margin: 20px; color: var(--primary); font-weight: bold; }
        .mermaid { width: 100%; text-align: center; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Histori-IA</h1>
        <p>Recurso Educativo Interactivo - 2º Bachillerato</p>
    </div>

    <div class="search-container">
        <input type="text" id="userInput" placeholder="Prueba: CÁNOVAS, SAGASTA, ISABEL II...">
        <button onclick="generateDiagram()">Generar</button>
    </div>

    <div id="loading">Buscando en la base de datos histórica...</div>

    <div class="canvas" id="canvas">
        <div id="graphOutput" class="mermaid">
            graph TD
                A[Escribe un personaje] --> B[La App buscará:]
                B --> C(Familia)
                B --> D(Sociedad)
                B --> E(Economía)
        </div>
    </div>

    <script>
        async function generateDiagram() {
            // 1. Capturamos el texto, lo pasamos a mayúsculas, quitamos espacios y eliminamos tildes
            let input = document.getElementById('userInput').value
                .toUpperCase()
                .trim()
                .normalize("NFD")
                .replace(/[\u0300-\u036f]/g, "");

            const loading = document.getElementById('loading');
            const graphOutput = document.getElementById('graphOutput');

            if(!input) return;

            loading.style.display = 'block';
            
            try {
                // 2. Buscamos el archivo datos.json (añadimos un timestamp para evitar la caché del navegador)
                const response = await fetch('datos.json?v=' + new Date().getTime());
                const datos = await response.json();

                if (datos[input]) {
                    loading.style.display = 'none';
                    
                    // 3. Limpiamos y preparamos el nuevo código
                    graphOutput.removeAttribute('data-processed');
                    graphOutput.innerHTML = datos[input];
                    
                    // 4. Renderizamos el diagrama con Mermaid
                    await mermaid.run({
                        nodes: [graphOutput],
                    });
                } else {
                    loading.style.display = 'none';
                    alert("Personaje no encontrado. Prueba con: CARLOS IV, ISABEL II, GOYA, FERNANDO VII, CANOVAS o SAGASTA.");
                }
            } catch (error) {
                console.error("Error leyendo la base de datos", error);
                loading.style.display = 'none';
                alert("Error al cargar los datos. Revisa que datos.json exista y no tenga errores de formato.");
            }
        }
    </script>
</body>
</html>
