<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histori-IA | TFM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ 
            startOnLoad: true, 
            theme: 'base',
            securityLevel: 'loose',
            flowchart: { useMaxWidth: true, htmlLabels: true, curve: 'basis' },
            themeVariables: {
                primaryColor: '#ffffff',
                primaryTextColor: '#2c3e50',
                lineColor: '#34495e',
                fontFamily: "'Inter', sans-serif"
            }
        });
        window.mermaid = mermaid;
    </script>
    <style>
        :root { --primary: #1a56db; --bg-web: #f7f3e8; --bg-card: #ffffff; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-web); margin: 0; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .header { text-align: center; padding: 40px; background-color: var(--primary); color: white; width: 100%; border-bottom: 5px solid #0e37a0; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 2.5em; margin: 0; }
        .search-container { background: var(--bg-card); padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 80%; max-width: 600px; display: flex; gap: 10px; position: relative; top: -25px; z-index: 10; }
        input { flex-grow: 1; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; font-size: 16px; }
        button { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .canvas { background: var(--bg-card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 95%; max-width: 1100px; min-height: 600px; margin-bottom: 50px; display: flex; justify-content: center; overflow: hidden; }
        .mermaid { width: 100%; }
        #loading { display: none; color: var(--primary); font-weight: bold; margin-bottom: 5px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Histori-IA</h1>
        <p>Explora la Historia de España por Categorías</p>
    </div>
    <div class="search-container">
        <input type="text" id="userInput" placeholder="Ej: CANOVAS, SAGASTA, ISABEL II...">
        <button onclick="generateDiagram()">Generar Árbol</button>
    </div>
    <div id="loading">Construyendo mapa conceptual...</div>
    <div class="canvas">
        <div id="graphOutput" class="mermaid">
            graph TD
                A((Escribe un personaje)) --> B{FAMILIA}
                A --> C{SOCIEDAD}
                A --> D{ECONOMÍA}
        </div>
    </div>

    <script>
        async function generateDiagram() {
            let input = document.getElementById('userInput').value.toUpperCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            const graphOutput = document.getElementById('graphOutput');
            const loading = document.getElementById('loading');
            if(!input) return;
            loading.style.display = 'block';
            try {
                const response = await fetch('datos.json?v=' + new Date().getTime());
                const datos = await response.json();
                if (datos[input]) {
                    graphOutput.removeAttribute('data-processed');
                    graphOutput.innerHTML = datos[input];
                    await mermaid.run({ nodes: [graphOutput] });
                } else {
                    alert("Personaje no encontrado.");
                }
            } catch (e) { console.error(e); }
            finally { loading.style.display = 'none'; }
        }
    </script>
</body>
</html>
