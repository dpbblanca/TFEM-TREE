<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histori-IA | TFM</title>
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ startOnLoad: true, theme: 'neutral' });
        window.mermaid = mermaid;
    </script>
    <style>
        :root { --primary: #2563eb; --bg: #f8fafc; }
        body { font-family: 'Inter', system-ui, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; margin-bottom: 30px; }
        .search-container { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.1); width: 100%; max-width: 600px; display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex-grow: 1; padding: 12px; border: 2px solid #e2e8f0; border-radius: 8px; font-size: 16px; outline: none; transition: border 0.2s; }
        input:focus { border-color: var(--primary); }
        button { background: var(--primary); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-weight: 600; cursor: pointer; transition: opacity 0.2s; }
        button:hover { opacity: 0.9; }
        .canvas { background: white; padding: 20px; border-radius: 16px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 100%; max-width: 900px; min-height: 400px; display: flex; flex-direction: column; align-items: center; }
        #loading { display: none; margin: 20px; color: var(--primary); font-weight: bold; }
        .mermaid { width: 100%; }
    </style>
</head>
<body>

    <div class="header">
        <h1>Histori-IA</h1>
        <p>Recurso Educativo Interactivo - 2º Bachillerato</p>
    </div>

    <div class="search-container">
        <input type="text" id="userInput" placeholder="Ej: Isabel II, Goya, Cánovas...">
        <button onclick="generateDiagram()">Generar</button>
    </div>

    <div id="loading">Consultando con la IA Histórica...</div>

    <div class="canvas" id="canvas">
        <div id="graphOutput" class="mermaid">
            %% Diagrama inicial de ejemplo
            graph TD
                A[Escribe un personaje] --> B[La IA analizará:]
                B --> C(Familia)
                B --> D(Sociedad)
                B --> E(Economía)
        </div>
    </div>

    <script>
        function generateDiagram() {
            const input = document.getElementById('userInput').value;
            if(!input) return;

            // Simulamos carga
            document.getElementById('loading').style.display = 'block';
            document.getElementById('graphOutput').style.opacity = '0.3';

            // En el futuro, aquí llamaremos a la API de OpenAI
            // Por ahora, simulamos que responde a los 1.5 segundos
            setTimeout(() => {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('graphOutput').style.opacity = '1';
                
                alert("¡Genial! En la siguiente fase conectaremos con la IA para generar el árbol de " + input);
            }, 1500);
        }
    </script>
</body>
</html>
