<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Histori-IA | TFM</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';
        mermaid.initialize({ 
            startOnLoad: true, 
            theme: 'base',
            securityLevel: 'loose', // Necesario para que funcionen los clics
            themeVariables: {
                primaryColor: '#ffffff',
                primaryTextColor: '#2c3e50',
                lineColor: '#34495e',
                fontFamily: "'Inter', sans-serif"
            }
        });
        window.mermaid = mermaid;
    </script>
    <style>
        :root { --primary: #1a56db; --bg-web: #f7f3e8; --bg-card: #ffffff; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg-web); margin: 0; display: flex; flex-direction: column; align-items: center; }
        .header { text-align: center; padding: 40px; background-color: var(--primary); color: white; width: 100%; border-bottom: 5px solid #0e37a0; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 2.5em; margin: 0; }
        .search-container { background: var(--bg-card); padding: 20px; border-radius: 15px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 80%; max-width: 600px; display: flex; gap: 10px; position: relative; top: -25px; }
        input { flex-grow: 1; padding: 12px; border: 2px solid #e2e8f0; border-radius: 10px; }
        button { background: var(--primary); color: white; border: none; padding: 12px 20px; border-radius: 10px; cursor: pointer; font-weight: bold; }
        .canvas { background: var(--bg-card); padding: 20px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 90%; max-width: 1000px; min-height: 500px; margin-bottom: 50px; overflow: auto; }
        /* Estilo para que los nodos parezcan clicables */
        .node { cursor: pointer !important; transition: transform 0.2s; }
        .node:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <div class="header">
        <h1>Histori-IA</h1>
        <p>Mapas Conceptuales Dinámicos e Interactivos</p>
    </div>
    <div class="search-container">
        <input type="text" id="userInput" placeholder="Escribe: CANOVAS, SAGASTA...">
        <button onclick="generateDiagram()">GENERAR ÁRBOL</button>
    </div>
    <div class="canvas" id="canvas">
        <div id="graphOutput" class="mermaid">
            graph LR
                A((Histori-IA)) --> B(Personajes)
                A --> C(Contexto)
                A --> D(Economía)
        </div>
    </div>

    <script>
        async function generateDiagram() {
            let input = document.getElementById('userInput').value.toUpperCase().trim().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
            const graphOutput = document.getElementById('graphOutput');
            if(!input) return;
            
            try {
                const response = await fetch('datos.json?v=' + new Date().getTime());
                const datos = await response.json();
                if (datos[input]) {
                    graphOutput.removeAttribute('data-processed');
                    graphOutput.innerHTML = datos[input];
                    await mermaid.run({ nodes: [graphOutput] });
                } else {
                    alert("No encontrado");
                }
            } catch (e) { console.error(e); }
        }
    </script>
</body>
</html>
